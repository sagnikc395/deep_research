[app]
name = "deep-research"

# Used for planning (subtask generation) and synthesis
planner_model_id   = "deepseek-ai/DeepSeek-V3.2-Exp"
planner_provider   = "together"

# Used for research sub-agents (web search + page visits)
agent_model_id     = "MiniMaxAI/MiniMax-M1-80k"
agent_provider     = "novita"

[rlm]
max_iterations     = 15
max_depth          = 2
planning_max_depth = 2
